name: Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
  TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
  TF_VAR_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
  TF_VAR_public_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_default_zone: "ru-central1-a"
  TF_VAR_vm_image_family: "ubuntu-2204-lts"
  TF_VAR_vm_name: "kittygram-vm"
  AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra

    steps:
      - uses: actions/checkout@v3

      - name: Create YC key file
        run: echo '${{ secrets.YC_SERVICE_ACCOUNT_KEY }}' > /tmp/yc_key.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform plan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Get VM IP
        if: github.event.inputs.action == 'apply'
        working-directory: ./infra
        run: |
          terraform state show yandex_compute_instance.vm | grep -oP 'nat_ip_address\s*=\s*"\K[^"]+' | head -1 > ../vm_ip.txt
          echo "Extracted IP: $(cat ../vm_ip.txt)"

      - name: Update SSH_HOST secret
        if: github.event.inputs.action == 'apply'
        run: |
          if [ -f vm_ip.txt ]; then
            IP=$(cat vm_ip.txt)
            gh secret set SSH_HOST --body "$IP" --repo ${{ github.repository }}
            echo "SSH_HOST updated to $IP"
          else
            echo "vm_ip.txt not found, skipping secret update"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve

      - name: Show outputs after apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform output
